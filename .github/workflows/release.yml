name: 建立 Release（打 tag 並產生 Release Note）

on:
  workflow_dispatch:
    inputs:
      bump:
        description: '版號升級方式（以目前最新的 git tag 為基準計算下一版）'
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    name: 打 tag 並發布 GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 根據目前最新 tag 計算下一版版號
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo 'v0.0.0')
          echo "目前最新 tag：$LATEST_TAG"

          if ! [[ "$LATEST_TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "::error::目前最新 tag「$LATEST_TAG」不符合 vX.Y.Z 格式，無法自動計算下一版"
            exit 1
          fi
          MAJOR="${BASH_REMATCH[1]}"
          MINOR="${BASH_REMATCH[2]}"
          PATCH="${BASH_REMATCH[3]}"

          case "${{ github.event.inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "下一版版號：$VERSION"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: 驗證版號格式與唯一性
        run: |
          if ! [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::計算出的版號「$VERSION」不符合 vX.Y.Z 格式"
            exit 1
          fi
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "::error::tag $VERSION 已經存在"
            exit 1
          fi

      - name: 建立並推送 tag
        run: |
          git tag "$VERSION"
          git push origin "$VERSION"

      - name: 建立 GitHub Release（自動依 commit / PR 產生 Release Note）
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes
          gh release view "$VERSION" --json body -q .body > /tmp/release_note_body.md

      - name: 把 Release Note 同步到 Wiki
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          WIKI_DIR="$(mktemp -d)"
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git" "$WIKI_DIR"

          PAGE="$WIKI_DIR/Release-Notes.md"
          [ -f "$PAGE" ] || echo "# Release Notes" > "$PAGE"

          {
            head -n 1 "$PAGE"
            echo ""
            echo "## $VERSION（$(date -u +%Y-%m-%d)）"
            echo ""
            cat /tmp/release_note_body.md
            tail -n +2 "$PAGE"
          } > /tmp/merged.md
          mv /tmp/merged.md "$PAGE"

          cd "$WIKI_DIR"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Release-Notes.md
          git commit -m "Add release notes for $VERSION"
          git push
