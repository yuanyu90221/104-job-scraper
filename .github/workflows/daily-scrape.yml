name: Daily 104 Job Scrape - golang 後端工程師

on:
  schedule:
    - cron: '7 1 * * *'
  workflow_dispatch:
    inputs:
      keyword:
        description: '搜尋關鍵字'
        required: false
        default: 'golang 後端工程師'
      months:
        description: '幾個月內的職缺'
        required: false
        default: '3'
      pages:
        description: '爬取頁數'
        required: false
        default: '15'
      line_top:
        description: '推播到 LINE 的職缺筆數'
        required: false
        default: '10'

jobs:
  scrape-and-notify:
    name: 爬取職缺並傳送 LINE 通知
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build binary
        run: go build -o bin/104-job-scraper ./cmd/main.go

      - name: Run job scraper
        id: scrape
        continue-on-error: true
        env:
          DISPLAY: ':0'
          # go-rod launches the runner's pre-installed Chrome rather than
          # auto-downloading Chromium on every ephemeral run; the A/B
          # investigation already showed browser channel doesn't affect
          # Cloudflare's block rate, so this is fixed rather than exposed
          # as an input.
          SCRAPER_BROWSER_CHANNEL: chrome
          LINE_CHANNEL_SECRET: ${{ secrets.LINE_CHANNEL_SECRET }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TARGET_ID: ${{ secrets.LINE_TARGET_ID }}
        run: |
          KEYWORD="${{ github.event.inputs.keyword || 'golang 後端工程師' }}"
          MONTHS="${{ github.event.inputs.months || '3' }}"
          PAGES="${{ github.event.inputs.pages || '15' }}"
          LINE_TOP="${{ github.event.inputs.line_top || '10' }}"

          echo "=== 搜尋條件 ==="
          echo "關鍵字: $KEYWORD"
          echo "時間範圍: 近 ${MONTHS} 個月"
          echo "最多頁數: $PAGES 頁"
          echo "LINE 推播筆數: $LINE_TOP"

          mkdir -p output
          ./bin/104-job-scraper \
            --keyword="$KEYWORD" \
            --months="$MONTHS" \
            --days=30 \
            --pages="$PAGES" \
            --format=json \
            --output=output/jobs.json \
            --line-top="$LINE_TOP"

      - name: Check scrape result
        if: steps.scrape.outcome == 'failure'
        run: |
          echo "::error::爬蟲失敗。請確認 self-hosted runner 正在執行，且本機有 DISPLAY 環境變數。"

      - name: Show scrape summary
        if: always()
        run: |
          if [ -f output/jobs.json ]; then
            echo "=== 爬取結果摘要 ==="
            python3 - << 'PYEOF'
          import json
          with open('output/jobs.json') as f:
              jobs = json.load(f)
          print(f'共 {len(jobs)} 筆職缺')
          for i, j in enumerate(jobs[:5], 1):
              date = j.get("appearDate", "")
              if len(date) == 8:
                  date = f"{date[:4]}-{date[4:6]}-{date[6:]}"
              print(f'{i}. {j["jobName"]} @ {j["custName"]} ({date})')
          if len(jobs) > 5:
              print(f'... 還有 {len(jobs)-5} 筆')
          PYEOF
          fi

      - name: Upload job results as artifact
        if: steps.scrape.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: daily-jobs-${{ github.run_id }}
          path: output/jobs.json
          retention-days: 30

      - name: Fail job if scrape failed
        if: steps.scrape.outcome == 'failure'
        run: exit 1
