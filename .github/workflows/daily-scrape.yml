name: Daily 104 Job Scrape - golang 後端工程師

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      keyword:
        description: '搜尋關鍵字'
        required: false
        default: 'golang 後端工程師'
      months:
        description: '幾個月內的職缺'
        required: false
        default: '3'
      pages:
        description: '爬取頁數'
        required: false
        default: '15'

jobs:
  scrape-and-notify:
    name: 爬取職缺並傳送 LINE 通知
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install Playwright Chromium
        run: go run github.com/mxschmitt/playwright-go/cmd/playwright install --with-deps chromium

      - name: Build binary
        run: go build -o bin/104-job-scraper ./cmd/main.go

      - name: Run job scraper
        id: scrape
        continue-on-error: true
        run: |
          KEYWORD="${{ github.event.inputs.keyword || 'golang 後端工程師' }}"
          MONTHS="${{ github.event.inputs.months || '3' }}"
          PAGES="${{ github.event.inputs.pages || '15' }}"

          echo "=== 搜尋條件 ==="
          echo "關鍵字: $KEYWORD"
          echo "時間範圍: 近 ${MONTHS} 個月"
          echo "最多頁數: $PAGES 頁"

          mkdir -p output
          ./bin/104-job-scraper \
            --keyword="$KEYWORD" \
            --months="$MONTHS" \
            --days=30 \
            --pages="$PAGES" \
            --format=json \
            --output=output/jobs.json \
            --line-token="${{ secrets.LINE_NOTIFY_TOKEN }}" \
            --line-top=10

      - name: Check scrape result
        if: steps.scrape.outcome == 'failure'
        run: |
          echo "::warning::爬蟲失敗。104.com.tw 封鎖了 GitHub Actions 的 IP（Cloudflare 保護）。"
          echo "::warning::建議使用 self-hosted runner 或在本機直接執行 CLI。"

      - name: Show scrape summary
        if: always()
        run: |
          if [ -f output/jobs.json ]; then
            echo "=== 爬取結果摘要 ==="
            python3 - << 'PYEOF'
          import json
          with open('output/jobs.json') as f:
              jobs = json.load(f)
          print(f'共 {len(jobs)} 筆職缺')
          for i, j in enumerate(jobs[:5], 1):
              print(f'{i}. {j["jobName"]} @ {j["company"]["companyName"]} ({j["publishDate"]})')
          if len(jobs) > 5:
              print(f'... 還有 {len(jobs)-5} 筆')
          PYEOF
          fi

      - name: Upload job results as artifact
        if: steps.scrape.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: daily-jobs-${{ github.run_id }}
          path: output/jobs.json
          retention-days: 30
