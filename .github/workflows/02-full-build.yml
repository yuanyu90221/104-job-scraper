name: 教學 Step 2 - 全量 Build (無快取，作為 baseline)

on:
  workflow_dispatch:

jobs:
  full-build:
    name: 清除快取後全量 build（模擬第一次執行）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "產生 Mermaid 教學圖 (Job Summary)"
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## 🔴 Step 2: 全量 Build（無快取）

          ```mermaid
          graph TD
              subgraph "全量 Build - 每個套件都重新編譯"
                  A["⚙️ 編譯 models"] --> B["⚙️ 編譯 client"]
                  B --> C["⚙️ 編譯 search"]
                  A --> D["⚙️ 編譯 formatter"]
                  A --> E["⚙️ 編譯 notifier"]
                  C --> F["⚙️ 編譯 cmd"]
                  D --> F
                  E --> F
              end

              style A fill:#ff9999
              style B fill:#ff9999
              style C fill:#ff9999
              style D fill:#ff9999
              style E fill:#ff9999
              style F fill:#ff9999
          ```

          > ⚠️ 紅色表示需要重新編譯。無快取時全部都要重新編譯。
          > 執行完後請對比 Step 3 的增量 build 時間差異。
          EOF

      - name: "Setup Pants (不啟用快取)"
        uses: pantsbuild/actions/init-pants@v8
        with:
          cache-lmdb-store: false

      - name: "記錄全量 build 開始時間"
        run: echo "START=$(date +%s)" >> $GITHUB_ENV

      - name: "Full Build: pants test :: (全部套件)"
        run: pants test ::

      - name: "輸出全量 build 耗時並更新 Summary"
        run: |
          ELAPSED=$(( $(date +%s) - START ))
          echo "=== 全量 build 耗時：${ELAPSED} 秒 ==="

          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## ⏱️ 全量 Build 耗時：${ELAPSED} 秒

          | 套件 | 狀態 |
          |------|------|
          | internal/models | 🔴 重新編譯 |
          | internal/client | 🔴 重新編譯 |
          | internal/search | 🔴 重新編譯 |
          | internal/formatter | 🔴 重新編譯 |
          | internal/notifier | 🔴 重新編譯 |
          | cmd | 🔴 重新編譯 |

          > 請記住此時間，與 Step 3 的增量 build 比較。
          EOF

      - name: "Full Build: pants package"
        run: pants package cmd:main
