name: 教學 Step 2 - 全量 Build (無快取)

on:
  workflow_dispatch:

jobs:
  full-build:
    name: 清除快取後全量 build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: 產生 Mermaid 教學圖 (Job Summary)
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'SUMMARY'
          ## 🔴 Step 2: 全量 Build（無快取）

          ```mermaid
          graph TD
              subgraph all["全量 Build - 每個套件都重新編譯"]
                  A["models"] --> B["client"]
                  B --> C["search"]
                  A --> D["formatter"]
                  A --> E["notifier"]
                  C --> F["cmd"]
                  D --> F
                  E --> F
              end
              style A fill:#ff9999
              style B fill:#ff9999
              style C fill:#ff9999
              style D fill:#ff9999
              style E fill:#ff9999
              style F fill:#ff9999
          ```

          > 紅色表示需要重新編譯。無快取時全部重新編譯。
          SUMMARY

      - name: Install Pants (無快取)
        run: |
          curl --proto '=https' --tlsv1.2 -fsSL https://static.pantsbuild.org/setup/get-pants.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: 記錄全量 build 開始時間
        run: echo "START=$(date +%s)" >> "$GITHUB_ENV"

      - name: Full Build - pants test all packages
        run: |
          pants test ::

      - name: 輸出全量 build 耗時並更新 Summary
        run: |
          ELAPSED=$(( $(date +%s) - START ))
          echo "=== 全量 build 耗時：${ELAPSED} 秒 ==="
          echo "## 全量 Build 耗時：${ELAPSED} 秒" >> "$GITHUB_STEP_SUMMARY"

      - name: Full Build - pants package
        run: pants package cmd:main
