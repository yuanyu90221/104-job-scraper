name: Pants CI (PR & Push)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: gofmt check
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: go build
        run: go build -o /tmp/104-job-scraper ./cmd/main.go

  pants-build:
    name: Pants Build (incremental compile)
    runs-on: ubuntu-latest
    env:
      GOEXPERIMENT: ""
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Cache Pants LMDB store
        uses: actions/cache@v4
        with:
          path: ~/.cache/pants/lmdb_store
          key: "pants-lmdb-${{ runner.os }}-${{ hashFiles('pants.toml', 'go.sum') }}"
          restore-keys: |
            pants-lmdb-${{ runner.os }}-

      - name: Install Pants
        run: |
          curl --proto '=https' --tlsv1.2 -fsSL https://static.pantsbuild.org/setup/get-pants.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Patch Pants Go backend (GOEXPERIMENT workaround for Go 1.24+)
        run: |
          pants --no-pantsd version
          bash scripts/patch-pants-go.sh

      - name: Pants list all targets
        run: |
          pants list ::

      - name: Pants package binary
        run: |
          pants package cmd:bin
