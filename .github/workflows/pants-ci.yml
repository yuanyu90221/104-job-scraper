name: Pants CI (PR & Push)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Test / Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Cache Pants LMDB store
        uses: actions/cache@v4
        with:
          path: ~/.cache/pants/lmdb_store
          key: "pants-lmdb-${{ runner.os }}-${{ hashFiles('pants.toml', 'go.sum') }}"
          restore-keys: |
            pants-lmdb-${{ runner.os }}-

      - name: Install Pants
        run: |
          curl --proto '=https' --tlsv1.2 -fsSL https://static.pantsbuild.org/setup/get-pants.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify BUILD files are up to date
        run: pants tailor --check ::

      - name: Test (all packages)
        run: pants test ::

      - name: Build binary
        run: pants package cmd:main
