name: 教學 Step 3 - 增量 Build (有快取)

on:
  workflow_dispatch:
    inputs:
      changed_package:
        description: '模擬變更了哪個套件（用於 Mermaid 視覺化）'
        required: false
        default: 'formatter'
        type: choice
        options:
          - formatter
          - client
          - models
          - notifier

jobs:
  incremental-build:
    name: 有快取的增量 build
    runs-on: ubuntu-latest
    env:
      GOEXPERIMENT: ""
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Cache Pants LMDB store
        uses: actions/cache@v4
        with:
          path: ~/.cache/pants/lmdb_store
          key: "pants-lmdb-${{ runner.os }}-${{ hashFiles('pants.toml', 'go.sum') }}"
          restore-keys: |
            pants-lmdb-${{ runner.os }}-

      - name: Install Pants
        run: |
          curl --proto '=https' --tlsv1.2 -fsSL https://static.pantsbuild.org/setup/get-pants.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Patch Pants Go backend (GOEXPERIMENT workaround for Go 1.24+)
        run: |
          pants version
          bash scripts/patch-pants-go.sh

      - name: 產生增量 Build Mermaid 圖 - formatter 情境
        if: ${{ github.event.inputs.changed_package == 'formatter' || github.event.inputs.changed_package == '' }}
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'SUMMARY'
          ## 🟢 Step 3: 增量 Build - 只修改 formatter

          ```mermaid
          graph TD
              models["models"] --> client["client"]
              client --> search["search"]
              models --> formatter["formatter 變更"]
              models --> notifier["notifier"]
              search --> cmd["cmd 需重建"]
              formatter --> cmd
              notifier --> cmd
              style formatter fill:#ff9999,stroke:#333,stroke-width:3px
              style cmd fill:#ffcc99,stroke:#333,stroke-width:3px
              style models fill:#99ff99
              style client fill:#99ff99
              style search fill:#99ff99
              style notifier fill:#99ff99
          ```

          > 綠色=快取命中，紅色=重新編譯，橘色=因依賴而重建
          SUMMARY

      - name: 產生增量 Build Mermaid 圖 - models 情境
        if: ${{ github.event.inputs.changed_package == 'models' }}
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'SUMMARY'
          ## 🟢 Step 3: 增量 Build - 修改 models（影響全部）

          ```mermaid
          graph TD
              models["models 變更"] --> client["client 需重建"]
              client --> search["search 需重建"]
              models --> formatter["formatter 需重建"]
              models --> notifier["notifier 需重建"]
              search --> cmd["cmd 需重建"]
              formatter --> cmd
              notifier --> cmd
              style models fill:#ff9999,stroke:#333,stroke-width:3px
              style client fill:#ffcc99
              style search fill:#ffcc99
              style formatter fill:#ffcc99
              style notifier fill:#ffcc99
              style cmd fill:#ffcc99
          ```

          > models 是底層依賴，變更時所有套件都需重建！
          SUMMARY

      - name: 增量 Build - 偵測變更範圍
        run: |
          echo "=== 偵測到的變更 targets ==="
          pants --changed-since=HEAD~1 --changed-dependents=transitive list || echo "(無變更)"

      - name: 記錄開始時間
        run: echo "START=$(date +%s)" >> "$GITHUB_ENV"

      - name: 增量 Build - 只測試有變更的套件及其下游依賴
        run: |
          CHANGED=$(pants --changed-since=HEAD~1 --changed-dependents=transitive list 2>/dev/null || true)
          if [ -z "$CHANGED" ]; then
            echo "無變更 targets，跳過測試"
          else
            pants --changed-since=HEAD~1 --changed-dependents=transitive test
          fi

      - name: 輸出增量 build 耗時
        run: |
          ELAPSED=$(( $(date +%s) - START ))
          echo "=== 增量 build 耗時：${ELAPSED} 秒 ==="
          echo "## 增量 Build 耗時：${ELAPSED} 秒" >> "$GITHUB_STEP_SUMMARY"
