name: 教學 Step 1 - 展示 Pants Targets 與依賴圖

on:
  workflow_dispatch:

jobs:
  list-targets:
    name: 列出所有 Pants targets 並查看依賴圖
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Cache Pants LMDB store
        uses: actions/cache@v4
        with:
          path: ~/.cache/pants/lmdb_store
          key: "pants-lmdb-${{ runner.os }}-${{ hashFiles('pants.toml', 'go.sum') }}"
          restore-keys: |
            pants-lmdb-${{ runner.os }}-

      - name: Install Pants
        run: |
          curl --proto '=https' --tlsv1.2 -fsSL https://static.pantsbuild.org/setup/get-pants.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: 產生專案架構 Mermaid 圖 (Job Summary)
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'SUMMARY'
          ## 🏗️ 104 Job Scraper - 專案架構圖

          ### Package 依賴關係

          ```mermaid
          graph TD
              cmd["📦 cmd/main (CLI 入口)"]
              search["📦 internal/search (搜尋邏輯 + 分頁)"]
              client["📦 internal/client (HTTP Client)"]
              models["📦 internal/models (Job / SearchResponse)"]
              formatter["📦 internal/formatter (table / json / csv)"]
              notifier["📦 internal/notifier (LINE Notify)"]

              cmd --> search
              cmd --> formatter
              cmd --> notifier
              search --> client
              client --> models
              notifier --> models

              style models fill:#f9f,stroke:#333,stroke-width:2px
              style cmd fill:#bbf,stroke:#333,stroke-width:2px
          ```

          ### Pants Build 時序圖

          ```mermaid
          sequenceDiagram
              participant Dev as 開發者
              participant Pants as Pants Engine
              participant Cache as 本地快取
              participant Go as Go Compiler

              Dev->>Pants: pants test ::
              Pants->>Cache: 查詢哪些 target 有變更
              Cache-->>Pants: 只有 formatter 變更
              Pants->>Go: 只編譯 formatter + cmd
              Go-->>Pants: 編譯完成
              Pants->>Dev: 測試通過（其餘套件快取命中）
          ```

          ### GitHub Actions 每日爬取流程

          ```mermaid
          flowchart LR
              A["每日 09:00 Taiwan"] --> B["Checkout & Setup Go"]
              B --> C["go build ./cmd/main.go"]
              C --> D["執行爬蟲 golang 後端工程師 近3個月"]
              D --> E["過濾 + 格式化"]
              E --> F["LINE Notify 傳送前 10 筆"]
              E --> G["Artifact jobs.json"]
          ```
          SUMMARY

      - name: Step 1-1 - 列出所有 targets
        run: |
          pants list ::

      - name: Step 1-2 - 查看 search 套件依賴
        run: |
          pants dependencies internal/search:: || true

      - name: Step 1-3 - 查看 cmd 所有遞移依賴
        run: |
          pants dependencies --transitive cmd:: || true

      - name: 更新 Job Summary - Target 清單
        run: |
          echo "## Pants Target 清單" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          pants list :: >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
